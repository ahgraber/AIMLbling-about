---
# Runs the semantic-search pipeline (Python) and client (JS) test suites so the
# tokenizer parity gate, retrieval floors, and unit tests are enforced in CI
# rather than only when the author remembers to run them locally.
name: site-search tests

on: # yamllint disable-line rule:truthy
  pull_request:
    branches: ["main"]
    paths: ["hugo/assets/js/**", "hugo/layouts/**", "hugo/docker/**", "hugo/justfile", "site-search/**", "scripts/**", "pyproject.toml", "uv.lock"]
  push:
    branches: ["main"]
    paths: ["hugo/assets/js/**", "hugo/layouts/**", "hugo/docker/**", "hugo/justfile", "site-search/**", "scripts/**", "pyproject.toml", "uv.lock"]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Repo 🛒
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          submodules: false

      # Pin uv to the same version the Dockerfile uses (ghcr.io/astral-sh/uv:0.11.26)
      # via the version-scoped installer, so CI never pulls an unexpected uv
      # release. Prefer the SHA-pinned `astral-sh/setup-uv` action if adopting one.
      - name: Install uv 📦
        run: curl -LsSf https://astral.sh/uv/0.11.26/install.sh | sh

      - name: Sync site-search environment 🔁
        run: ~/.local/bin/uv sync --package site-search

      # Corpus/artifact-dependent tests self-skip without a Hugo build; the
      # tokenizer parity gate builds its own probe artifacts and runs here.
      - name: Python pipeline tests 🐍
        run: ~/.local/bin/uv run --package site-search pytest site-search/tests

      - name: Client JS tests 🟨
        run: node --test hugo/assets/js/*.test.js

  # Building the image runs the Dockerfile's two-pass Hugo build, the corpus
  # completeness gate, and `build_index` end-to-end — so a corpus regression,
  # gate failure, or broken index build fails this job (and the merge, once it
  # is a required status check). Reuses publish.yaml's pinned actions and the
  # treadmill module secret; no push, single platform for speed.
  build:
    name: container build (gate + index)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Repo 🛒
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          submodules: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx 🐳
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build image (enforces gate + index) 🛠
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          platforms: linux/amd64
          secrets: |
            treadmill_pat=${{ secrets.TREADMILL_PAT }}
          context: .
          file: ./hugo/docker/Dockerfile
          push: false
